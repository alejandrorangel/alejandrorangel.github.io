# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
title: Cats + Pizza ^ Coffe + Robots
email: arangel.glz@gmail.com
description: "Opinions expressed here are my own, not my employer's."
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://alejandrorangel.github.io" # the base hostname & protocol for your site
twitter_username: arangel_glz
github_username:  alejandrorangel

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# SEO defaults
lang: en
author: Alejandro Rangel
defaults:
  - scope:
      path: ""
    values:
      image: /assets/og-default.jpg

# Exclude files from the build
exclude:
  - MAINTENANCE.md
  - Gemfile
  - Gemfile.lock
  - vendor
